name: Product Review CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  train-and-register:
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v3

      - name: "Set up Python 3.9"
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: "Cache pip dependencies"
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: "Install dependencies"
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: "Download NLTK data"
        run: |
          python -m nltk.downloader stopwords wordnet omw-1.4

      - name: "Execute DVC Pipeline"
        env:
          CAPSTONE_TEST: ${{ secrets.DAGSHUB_USER_TOKEN }}
          DAGSHUB_REPO_OWNER: ${{ vars.DAGSHUB_REPO_OWNER || 'mudassarhussain6533' }}
          DAGSHUB_REPO_NAME: ${{ vars.DAGSHUB_REPO_NAME || 'Product-review-intelligence-system' }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          dvc repro --force

      - name: "Verify Pipeline Output"
        run: |
          echo "=== Metrics ==="
          cat reports/metrics.json || echo "metrics.json not found"
          echo ""
          echo "=== Registry Status ==="
          cat reports/registry_status.txt || echo "registry_status.txt not found"
          echo ""
          echo "Pipeline completed successfully."
