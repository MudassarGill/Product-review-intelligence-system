stages:
  data_ingestion:
    cmd: python src/data/data_ingestion.py
    deps:
      - src/data/data_ingestion.py
    params:
      - data_ingestion.test_size
      - data_ingestion.random_state
    outs:
      - data/raw/train.csv
      - data/raw/test.csv

  data_preprocessing:
    cmd: python src/data/data_preprocessing.py
    deps:
      - src/data/data_preprocessing.py
      - data/raw/train.csv
      - data/raw/test.csv
    outs:
      - data/processed/train.csv
      - data/processed/test.csv

  feature_engineering:
    cmd: python src/features/feature_engineering.py
    deps:
      - src/features/feature_engineering.py
      - data/processed/train.csv
      - data/processed/test.csv
    params:
      - feature_engineering.max_features
    outs:
      - data/features/X_train.npy
      - data/features/X_test.npy
      - data/features/y_train.npy
      - data/features/y_test.npy
      - models/count_vectorizer.pkl

  model_building:
    cmd: python scripts/model_building.py
    deps:
      - scripts/model_building.py
      - data/features/X_train.npy
      - data/features/y_train.npy
    params:
      - model_building.max_iter
      - model_building.random_state
    outs:
      - models/logistic_regression.pkl

  model_evaluation:
    cmd: python scripts/model_evaluation.py
    deps:
      - scripts/model_evaluation.py
      - models/logistic_regression.pkl
      - data/features/X_test.npy
      - data/features/y_test.npy
    metrics:
      - reports/metrics.json

  model_registry:
    cmd: python scripts/model_regestry.py --experiment_name Logistic-Regression-baseline --model_name Product-Review-Sentiment-Model --stage Staging
    deps:
      - scripts/model_regestry.py
      - reports/metrics.json
    outs:
      - reports/registry_status.txt

  model_promotion:
    cmd: python scripts/model_promotion.py
    deps:
      - scripts/model_promotion.py
      - reports/registry_status.txt
    params:
      - model_promotion.model_name
