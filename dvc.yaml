stages:
  data_ingestion:
    cmd: python src/data/data_ingestion.py
    deps:
      - src/data/data_ingestion.py
    params:
      - data_ingestion.test_size
      - data_ingestion.random_state
    outs:
      - data/raw/train.csv
      - data/raw/test.csv

  data_preprocessing:
    cmd: python src/data/data_preprocessing.py
    deps:
      - src/data/data_preprocessing.py
      - data/raw/train.csv
      - data/raw/test.csv
    outs:
      - data/processed/train.csv
      - data/processed/test.csv

  feature_engineering:
    cmd: python src/features/feature_engineering.py
    deps:
      - src/features/feature_engineering.py
      - data/processed/train.csv
      - data/processed/test.csv
    params:
      - feature_engineering.max_features
    outs:
      - data/features/X_train.npy
      - data/features/X_test.npy
      - data/features/y_train.npy
      - data/features/y_test.npy
      - models/count_vectorizer.pkl

  model_building:
    cmd: python models/model_building.py
    deps:
      - models/model_building.py
      - data/features/X_train.npy
      - data/features/y_train.npy
    params:
      - model_building.max_iter
      - model_building.random_state
    outs:
      - models/logistic_regression.pkl

  model_evaluation:
    cmd: python models/model_evaluation.py
    deps:
      - models/model_evaluation.py
      - models/logistic_regression.pkl
      - data/features/X_test.npy
      - data/features/y_test.npy

  model_registry:
    cmd: python models/model_regestry.py
    deps:
      - models/model_regestry.py
